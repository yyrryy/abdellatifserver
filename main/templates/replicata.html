{% extends 'base.html' %}

{% load static %}


{% block content %}
<div class="alert mb-3 mt-3 text-center" style="background: orange;">
  <strong style="font-size: 32px">
    Reliquats
  </strong>
</div>
{%for i in items%}
  <div class="mb-2 d-flex align-items-center border-bottom p-3 cart-item" style="
      background: aliceblue;
      border-radius: 2em;
  ">
    <!-- Image -->
    <div class="me-3">
      <img
        src="{%if i.product.image %}{{ i.product.image.url }}{%endif%}"
        width="200"
        onclick="displayimage(event, '{%if i.product.image %}{{ i.product.image.url }}{%endif%}')"
        data-toggle="modal"
        data-target="#imagedisplaymodal"
        class="imagedisplaybtn img-fluid"
        imgsrc="{%if i.product.image %}{{ i.product.image.url }}{%endif%}"
      >
    </div>

    <!-- Name -->
    <div class="flex-grow-1 fw-bold">
      {{ i.product.ref.upper }} {{ i.product.name.upper }}
    </div>

    <!-- Price -->
    <div class="mx-3 text-end">
      <small class="priceholder" price="{{ i.product.sellprice }}">
        {{ i.product.sellprice }}
      </small>
    </div>

    <!-- Remise -->
    <div class="mx-3">
      {{ i.product.remise }}%
    </div>

    <!-- Quantity -->
    <div class="mx-3">
      <input
        class="form-control form-control-sm"
        style="width:170px"
        value="{{ i.qty }}"
        onchange="updatewishitem(event, {{ i.id }}, {{ i.product.id }}, {{ i.cart.id }})"
      >
    </div>

    <!-- Action -->
    <div class="mx-3">
      <button
        class="btn btn-danger btn-sm"
        onclick="cancelreliquat(event, {{ i.product.id }})"
      >
        X
      </button>
    </div>

    <!-- Status -->
    <div class="ms-2">
      <div class="status {{ i.status }}"></div>
    </div>

  </div>
{%endfor%}
